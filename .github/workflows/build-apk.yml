name: Build Android APK (Debug)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 根据你的项目需求调整，推荐 LTS 版本
          cache: 'pnpm'      # 自动缓存 pnpm 依赖

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          # 确保 capacitor 核心包已安装 (防止 package.json 遗漏)
          pnpm add @capacitor/core @capacitor/android --save-if-not-present

      - name: Build Web Assets (Vite)
        run: |
          pnpm build
          # 验证 dist 目录是否生成
          ls -la dist

      - name: Sync Capacitor Android
        run: |
          # 关键：不要运行 init！直接使用现有的 capacitor.config.ts
          # sync 会将 dist 目录的内容复制到 android 项目，并更新插件
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          # 确保 gradlew 有执行权限
          chmod +x gradlew
          
          # 构建 Debug 版本
          # 优点：自动使用 debug key 签名，可直接安装到手机测试
          # 缺点：不能用于 Google Play 发布 (发布需要 release 签名)
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist-apk-debug
          # Debug APK 的标准输出路径
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
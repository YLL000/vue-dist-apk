name: Build Android APK

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Vue app
        run: pnpm build

      - name: Install Capacitor CLI
        run: npx @capacitor/cli@latest init --web-dir dist --app-id io.agentic.app --app-name Agentic --no-interactive

      - name: Add Android platform
        run: npx @capacitor/cli@latest add android --no-interactive

      - name: Sync web assets
        run: npx @capacitor/cli@latest sync android

      - name: Build APK (Release)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

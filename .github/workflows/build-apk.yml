name: Build Android APK (Debug)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 【关键修正】先安装 pnpm，确保后续 setup-node 能够识别 pnpm 缓存
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 3. 设置 Node.js 环境并开启 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # 4. 设置 Java 环境 (Android 构建必须)
      # Ubuntu 镜像虽自带 Java，但显式指定 JDK 17 能避免很多 Gradle 兼容性问题
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 5. 设置 Gradle 缓存 (大幅缩短后续构建时间)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 6. 安装依赖 (使用 --frozen-lockfile 保证环境一致性)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 7. 构建前端资源 (生成 dist 目录)
      - name: Build Web Assets
        run: pnpm build

      # 8. 同步至 Capacitor Android 项目
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 9. 构建 Android APK
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # 10. 上传生成的 APK 产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

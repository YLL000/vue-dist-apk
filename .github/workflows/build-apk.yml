name: Build Android APK (Debug)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 建议使用 LTS 版本，根据你的项目调整
          # 注意：setup-node 的 cache 功能支持 pnpm，但为了稳定性，我们显式调用 pnpm setup
          cache: 'pnpm' 

      # 3. 安装 pnpm (关键修复步骤)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # 使用最新版本
        with:
          version: 9 # 指定 pnpm 版本，或使用 'latest'
          run_install: false # 我们不在这一步自动安装，稍后手动执行以控制日志

      # 4. 验证环境 (调试用，确认 pnpm 可用)
      - name: Verify pnpm installation
        run: |
          echo "Node version: $(node -v)"
          echo "Npm version: $(npm -v)"
          echo "Pnpm version: $(pnpm -v)"
          echo "Pnpm location: $(which pnpm)"

      # 5. 安装依赖
      - name: Install dependencies
        run: |
          # --frozen-lockfile 确保 lock 文件与 package.json 一致，防止意外更新
          pnpm install --frozen-lockfile
          
          # 确保 capacitor 包存在 (防御性编程)
          pnpm list @capacitor/core || pnpm add @capacitor/core @capacitor/android

      # 6. 构建前端资源
      - name: Build Web Assets
        run: |
          pnpm build
          ls -la dist

      # 7. 同步 Capacitor
      - name: Sync Capacitor Android
        run: |
          # 再次确认 config 文件存在
          ls -la capacitor.config.ts
          npx cap sync android

      # 8. 构建 Android APK
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # 9. 上传产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

name: Build Android APK

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use system Node.js (verify)
        run: |
          set -eux
          node -v
          npm -v

      - name: Install pnpm to /usr/local/bin
        run: |
          set -eux
          curl -fsSL https://get.pnpm.io/install.sh | sh -s -- -v -d /usr/local

      - name: Install deps & build
        run: |
          set -eux
          /usr/local/bin/pnpm install
          /usr/local/bin/pnpm build

      - name: Setup Capacitor
        run: |
          set -eux
          /usr/local/bin/pnpm add @capacitor/core @capacitor/android
          npx @capacitor/cli@latest init --web-dir dist --app-id io.yll000.vue-dist-apk --app-name "Vue Dist APK" --no-interactive
          npx @capacitor/cli@latest add android --no-interactive
          npx @capacitor/cli@latest sync android

      - name: Build APK
        working-directory: android
        run: |
          set -eux
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist-apk-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
